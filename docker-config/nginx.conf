server {
    listen 80;
    server_name bettaverse.my.id www.bettaverse.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bettaverse.my.id www.bettaverse.my.id;

    ssl_certificate /etc/letsencrypt/live/bettaverse.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bettaverse.my.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/public;
    index index.php index.html;

    # Ganti 'app' menjadi 'bettaverse-app' agar sesuai dengan docker-compose
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass bettaverse-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Perbaikan akses storage agar tidak 403
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ /index.php?$query_string;
    }
}
